services:
  app:
    image: oven/bun:1
    working_dir: /app
    command: sh -lc "if [ -f package.json ]; then bun install && bun run dev; else sleep infinity; fi"
    volumes:
      - ./:/app
      - bun-cache:/root/.bun
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app
      SUPABASE_URL: http://auth:9999
      POSTHOG_HOST: http://analytics:8010
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started

  db:
    image: postgres:16-alpine
    entrypoint:
      - /bin/sh
      - /usr/local/bin/db-entrypoint.sh
    command:
      - postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./.docker/db/entrypoint.sh:/usr/local/bin/db-entrypoint.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d app
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.188.1
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:postgres@db:5432/app?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000
      GOTRUE_JWT_SECRET: change-me-change-me-change-me-change-me
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: http://localhost:9999
    depends_on:
      db:
        condition: service_healthy

volumes:
  bun-cache:
  postgres-data: